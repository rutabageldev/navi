openapi: "3.1.0"
info:
  title: Navi Digest Service API
  version: "0.0.0"
paths:
  /v1/health/live:
    get:
      operationId: healthLive
      summary: Liveness check
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveResponse"
  /v1/health/ready:
    get:
      operationId: healthReady
      summary: Readiness check
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    LiveResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    ReadyResponse:
      type: object
      required: [status, version, checks]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string
          description: Deployed version, injected at build time
        checks:
          type: object
          properties:
            postgres:
              type: string
            nats:
              type: string
            vault:
              type: string
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
            message:
              type: string
            request_id:
              type: string
            trace_id:
              type: string
