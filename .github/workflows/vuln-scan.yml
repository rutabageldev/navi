name: Scheduled Vulnerability Scan

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:  # allow manual trigger

jobs:
  vuln-scan:
    name: Dependency vulnerability scan
    runs-on: [self-hosted]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      - name: govulncheck
        id: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go work edit -json | jq -r '.Use[].DiskPath' | \
            xargs -I{} sh -c 'cd "{}" && govulncheck ./...'
        continue-on-error: true

      - name: Trivy filesystem scan
        id: trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
        continue-on-error: true

      # Per ADR-0013: weekly scan results are delivered via email using
      # the Navi Resend integration. No findings = no email (silence is success).
      # Runs on the self-hosted runner so VAULT_TOKEN is available via .env
      # to fetch the Resend API key from Vault at secret/navi/prod/resend.
      - name: Email findings via Resend
        if: steps.govulncheck.outcome == 'failure' || steps.trivy.outcome == 'failure'
        run: |
          ENV_FILE="$(pwd)/.env"
          if [[ -f "$ENV_FILE" ]]; then
            set -a; source "$ENV_FILE"; set +a
          fi

          VAULT_ADDR="${VAULT_ADDR:-https://10.0.40.10:8200}"
          VAULT_CACERT="${VAULT_CACERT:-/opt/foundation/vault/tls/vault-ca.crt}"

          RESEND_SECRET=$(curl -sf \
            --cacert "$VAULT_CACERT" \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            "$VAULT_ADDR/v1/secret/data/navi/prod/resend" 2>/dev/null) || true

          RESEND_API_KEY=$(echo "$RESEND_SECRET" | jq -r '.data.data.api_key // empty')
          if [[ -z "$RESEND_API_KEY" ]]; then
            echo "Resend API key not available in Vault — skipping email notification."
            exit 0
          fi

          TOOLS=()
          [[ "${{ steps.govulncheck.outcome }}" == "failure" ]] && TOOLS+=("govulncheck")
          [[ "${{ steps.trivy.outcome }}" == "failure" ]] && TOOLS+=("Trivy")
          TOOL_LIST=$(IFS=', '; echo "${TOOLS[*]}")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"navi@rutabageldev.com\",
              \"to\": [\"rutabageldev@gmail.com\"],
              \"subject\": \"[Navi] Vulnerability findings — $TOOL_LIST\",
              \"text\": \"Weekly vulnerability scan found issues.\n\nTools with findings: $TOOL_LIST\nDate: $(date -u +%Y-%m-%d)\nRun: $RUN_URL\n\nReview the run logs for the full finding list. Resolve by upgrading affected dependencies or patching the base image.\"
            }" > /dev/null

          echo "Findings email sent."

      - name: Fail if findings found
        if: steps.govulncheck.outcome == 'failure' || steps.trivy.outcome == 'failure'
        run: exit 1
