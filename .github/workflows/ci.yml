name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Test, lint, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: go vet
        run: |
          go work edit -json | jq -r '.Use[].DiskPath' | \
            xargs -I{} go vet ./{}/...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: ./services/digest/... ./services/internal/...

      - name: Test (race detector)
        run: |
          go work edit -json | jq -r '.Use[].DiskPath' | \
            xargs -I{} go test -race ./{}/...

      - name: Build
        run: |
          go work edit -json | jq -r '.Use[].DiskPath' | \
            xargs -I{} go build ./{}/...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go work edit -json | jq -r '.Use[].DiskPath' | \
            xargs -I{} govulncheck ./{}/...
