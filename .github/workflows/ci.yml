name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      - name: go vet
        run: |
          go work edit -json | jq -r '.Use[].DiskPath' | \
            xargs -I{} go vet ./{}/...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: ./services/digest/... ./services/internal/...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      - name: Test (race detector)
        run: |
          go work edit -json | jq -r '.Use[].DiskPath' | \
            xargs -I{} go test -race ./{}/...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      - name: Build
        run: |
          go work edit -json | jq -r '.Use[].DiskPath' | \
            xargs -I{} go build ./{}/...

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          go work edit -json | jq -r '.Use[].DiskPath' | \
            xargs -I{} sh -c 'cd "{}" && govulncheck ./...'

      # Scans Go deps, config files, and secrets. HIGH/CRITICAL gates the PR.
      # For OS-layer vulns see the image scan in deploy.yml.
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
