name: Deploy

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to deploy (e.g. v0.1.0)"
        required: true

permissions:
  contents: write  # to commit .last-deployed-version back to main
  packages: write  # to push images to ghcr.io

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: [self-hosted]
    outputs:
      version: ${{ steps.version.outputs.value }}
      built: ${{ steps.build.outputs.built }}
      prev: ${{ steps.prev.outputs.value }}

    steps:
      - name: Load host credentials
        run: |
          ENV_FILE="/opt/navi/.env"
          if [[ ! -f "$ENV_FILE" ]]; then
            echo "ERROR: $ENV_FILE not found on runner" >&2
            exit 1
          fi
          grep -v '^#' "$ENV_FILE" | grep -v '^[[:space:]]*$' >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version
        id: version
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Read previous version
        id: prev
        run: echo "value=$(cat .last-deployed-version)" >> "$GITHUB_OUTPUT"

      - name: Build changed services
        id: build
        run: ./scripts/build.sh "$VERSION"
        env:
          VERSION: ${{ steps.version.outputs.value }}

      # Only scan if an image was actually built. CRITICAL threshold — image
      # scans hit OS packages; HIGH findings belong in the CI security job.
      - name: Scan image with Trivy
        if: steps.build.outputs.built == 'true'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/rutabageldev/navi-digest:${{ steps.version.outputs.value }}
          severity: CRITICAL
          exit-code: 1

  # ── Deploy staging ─────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy staging
    runs-on: [self-hosted]
    needs: build
    if: needs.build.outputs.built == 'true'

    steps:
      - name: Load host credentials
        run: |
          ENV_FILE="/opt/navi/.env"
          if [[ ! -f "$ENV_FILE" ]]; then
            echo "ERROR: $ENV_FILE not found on runner" >&2
            exit 1
          fi
          grep -v '^#' "$ENV_FILE" | grep -v '^[[:space:]]*$' >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push staging image
        run: |
          VERSION=${{ needs.build.outputs.version }}
          REPO=ghcr.io/rutabageldev/navi-digest
          docker tag "$REPO:$VERSION" "$REPO:staging"
          docker push "$REPO:$VERSION"
          docker push "$REPO:staging"

      - name: Deploy to staging
        run: ./scripts/deploy.sh staging "$VERSION" digest
        env:
          VERSION: ${{ needs.build.outputs.version }}
          NAVI_HOST: ${{ secrets.NAVI_HOST }}

  # ── Test staging ───────────────────────────────────────────────────────────
  test-staging:
    name: Test staging
    runs-on: [self-hosted]
    needs: [build, deploy-staging]
    if: needs.build.outputs.built == 'true'

    steps:
      - name: Load host credentials
        run: |
          ENV_FILE="/opt/navi/.env"
          if [[ ! -f "$ENV_FILE" ]]; then
            echo "ERROR: $ENV_FILE not found on runner" >&2
            exit 1
          fi
          grep -v '^#' "$ENV_FILE" | grep -v '^[[:space:]]*$' >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test staging
        id: smoketest
        run: make smoketest ENV=staging
        continue-on-error: true

      - name: Rollback staging on smoke test failure
        if: steps.smoketest.outcome == 'failure'
        run: ./scripts/rollback.sh staging "$PREV" digest
        env:
          PREV: ${{ needs.build.outputs.prev }}
          NAVI_HOST: ${{ secrets.NAVI_HOST }}

      - name: Smoke test staging rollback
        if: steps.smoketest.outcome == 'failure'
        id: smoketest-rollback
        run: make smoketest ENV=staging
        continue-on-error: true

      - name: Notify and fail on staging rollback
        if: steps.smoketest.outcome == 'failure'
        run: |
          VERSION=${{ needs.build.outputs.version }}
          PREV=${{ needs.build.outputs.prev }}
          if [[ "${{ steps.smoketest-rollback.outcome }}" == "success" ]]; then
            ./scripts/notify-sms.sh -env staging "Hey, listen! Navi $VERSION staging smoke tests FAILED — rolled back to $PREV successfully."
          else
            ./scripts/notify-sms.sh -env staging "Hey, listen! Navi $VERSION staging smoke tests FAILED — rollback to $PREV also failed. Manual intervention required."
          fi
          exit 1

  # ── Deploy prod ────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy prod
    runs-on: [self-hosted]
    needs: [build, test-staging]
    if: needs.build.outputs.built == 'true'

    steps:
      - name: Load host credentials
        run: |
          ENV_FILE="/opt/navi/.env"
          if [[ ! -f "$ENV_FILE" ]]; then
            echo "ERROR: $ENV_FILE not found on runner" >&2
            exit 1
          fi
          grep -v '^#' "$ENV_FILE" | grep -v '^[[:space:]]*$' >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push prod image
        run: |
          VERSION=${{ needs.build.outputs.version }}
          REPO=ghcr.io/rutabageldev/navi-digest
          docker tag "$REPO:$VERSION" "$REPO:prod"
          docker tag "$REPO:$VERSION" "$REPO:latest"
          docker push "$REPO:prod"
          docker push "$REPO:latest"

      - name: Deploy to prod
        run: ./scripts/deploy.sh prod "$VERSION" digest
        env:
          VERSION: ${{ needs.build.outputs.version }}
          NAVI_HOST: ${{ secrets.NAVI_HOST }}

  # ── Test prod ──────────────────────────────────────────────────────────────
  test-prod:
    name: Test prod
    runs-on: [self-hosted]
    needs: [build, deploy-prod]
    if: needs.build.outputs.built == 'true'

    steps:
      - name: Load host credentials
        run: |
          ENV_FILE="/opt/navi/.env"
          if [[ ! -f "$ENV_FILE" ]]; then
            echo "ERROR: $ENV_FILE not found on runner" >&2
            exit 1
          fi
          grep -v '^#' "$ENV_FILE" | grep -v '^[[:space:]]*$' >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Health check prod
        id: healthcheck
        run: make healthcheck ENV=prod
        continue-on-error: true

      - name: Rollback prod on health check failure
        if: steps.healthcheck.outcome == 'failure'
        run: ./scripts/rollback.sh prod "$PREV" digest
        env:
          PREV: ${{ needs.build.outputs.prev }}
          NAVI_HOST: ${{ secrets.NAVI_HOST }}

      - name: Health check prod rollback
        if: steps.healthcheck.outcome == 'failure'
        id: healthcheck-rollback
        run: make healthcheck ENV=prod
        continue-on-error: true

      - name: Notify and fail on prod rollback
        if: steps.healthcheck.outcome == 'failure'
        run: |
          VERSION=${{ needs.build.outputs.version }}
          PREV=${{ needs.build.outputs.prev }}
          if [[ "${{ steps.healthcheck-rollback.outcome }}" == "success" ]]; then
            ./scripts/notify-sms.sh -env prod "Hey, listen! Navi $VERSION prod health check FAILED — rolled back to $PREV successfully."
          else
            ./scripts/notify-sms.sh -env prod "Hey, listen! Navi $VERSION prod health check FAILED — rollback to $PREV also failed. Manual intervention required."
          fi
          exit 1

      # Only advance rollback state when a service was actually deployed to prod.
      - name: Update .last-deployed-version
        run: |
          VERSION=${{ needs.build.outputs.version }}
          echo "$VERSION" > .last-deployed-version
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git remote set-url origin \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git add .last-deployed-version
          git commit -m "chore(infra): update .last-deployed-version to $VERSION [skip ci]"
          git push origin HEAD:main

      - name: Send success SMS
        run: ./scripts/notify-sms.sh -env prod "Hey, listen! Navi ${{ needs.build.outputs.version }} deployed successfully."
