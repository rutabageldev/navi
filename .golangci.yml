version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - bodyclose
    - contextcheck
    - noctx
    - exhaustive
    - godot
    - misspell

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  goimports:
    local-prefixes:
      - github.com/rutabageldev/navi

issues:
  exclude-rules:
    - linters:
        - gosec
      text: "G104"  # Errors unhandled — handled by errcheck

run:
  timeout: 5m
