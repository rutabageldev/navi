repos:
  # Secret scanning — must be first
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks

  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: no-commit-to-branch
        args: [--branch=main]

  # Go formatting, vetting, and import ordering.
  # Local hooks are used instead of dnephin/pre-commit-golang because this repo
  # uses a go.work workspace; passing individual file paths to go vet does not
  # work correctly in that context.
  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        language: system
        entry: gofmt -l -w
        types: [go]
      - id: go-vet
        name: go vet
        language: system
        entry: bash -c './scripts/govet.sh'
        pass_filenames: false
        types: [go]
      - id: go-imports
        name: goimports
        language: system
        entry: goimports -l -w
        types: [go]

  # OpenAPI spec validation (runs check-jsonschema with the OAS 3.1 schema)
  - repo: local
    hooks:
      - id: validate-openapi
        name: Validate OpenAPI specs
        language: system
        entry: check-jsonschema --schemafile https://spec.openapis.org/oas/3.1/schema/2022-10-07
        types: [yaml]
        files: services/.*/api/openapi\.yaml$

  # Event schema validation (local hook)
  - repo: local
    hooks:
      - id: validate-event-schemas
        name: Validate event schemas
        language: system
        entry: make validate-schemas
        pass_filenames: false
        files: docs/events/schemas/.*\.json$

  # Conventional Commits enforcement
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.6.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
